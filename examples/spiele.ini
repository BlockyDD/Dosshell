; Spiele-Bibliothek fuer Dosshell
; Laden mit: load spiele.ini

; Zufallszahl in Bereich: zufall 1 100
[command:zufall]
math %RANDOM% % (%2 - %1 + 1) + %1

; Trennlinie zeichnen
[command:linie]
echo ========================================

; Punkte anzeigen: punkte 42
[command:punkte]
echo   Punkte: %1

; Countdown: countdown 3
[command:countdown]
echo   3...
echo   2...
echo   1...
echo   LOS!

; Spieltitel anzeigen: spieltitel Mein Spiel
[command:spieltitel]
clear
color cyan
echo
echo   ========================================
echo        %*
echo   ========================================
color white
echo

; Gewonnen-Meldung
[command:sieg]
echo
color green
echo   ************************************
echo   *         GEWONNEN!                *
echo   ************************************
color white

; Verloren-Meldung
[command:niederlage]
echo
color red
echo   ************************************
echo   *         VERLOREN!                *
echo   ************************************
color white
