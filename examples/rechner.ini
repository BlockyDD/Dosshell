; Taschenrechner Bibliothek fuer Dosshell
; Laden mit: load rechner.ini

; Interaktiver Taschenrechner
[command:rechner]
echo === Dosshell Taschenrechner ===
echo Operatoren: + - * / Klammern
echo ---
set /p ZAHL1=Erste Zahl:
set /p OP=Operator:
set /p ZAHL2=Zweite Zahl:
echo ---
echo %ZAHL1% %OP% %ZAHL2% =
set /a %ZAHL1% %OP% %ZAHL2%

; Schnellberechnung: berechne 3 + 4 * 2
[command:berechne]
set /a %*

; Quadrat: quadrat 5 -> 25
[command:quadrat]
set /a %1 * %1

; Kubik: kubik 3 -> 27
[command:kubik]
set /a %1 * %1 * %1

; Prozent: prozent 200 15 -> 30 (15% von 200)
[command:prozent]
set /a %1 * %2 / 100

; Durchschnitt von 2 Zahlen: avg 10 20 -> 15
[command:avg]
set /a (%1 + %2) / 2

; Flaeche Rechteck: flaeche 5 10 -> 50
[command:flaeche]
set /a %1 * %2

; Umfang Rechteck: umfang 5 10 -> 30
[command:umfang]
set /a 2 * (%1 + %2)

; Celsius zu Fahrenheit: c2f 100 -> 212
[command:c2f]
set /a %1 * 9 / 5 + 32

; Fahrenheit zu Celsius: f2c 212 -> 100
[command:f2c]
set /a (%1 - 32) * 5 / 9
