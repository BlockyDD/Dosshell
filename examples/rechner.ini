; Taschenrechner Bibliothek fuer Dosshell
; Laden mit: load rechner.ini

; Interaktiver Taschenrechner
[command:rechner]
echo === Dosshell Taschenrechner ===
echo Operatoren: + - * / Klammern
echo ---
input ZAHL1 Erste Zahl:
input OP Operator:
input ZAHL2 Zweite Zahl:
echo ---
echo %ZAHL1% %OP% %ZAHL2% =
math %ZAHL1% %OP% %ZAHL2%

; Schnellberechnung: berechne 3 + 4 * 2
[command:berechne]
math %*

; Quadrat: quadrat 5 -> 25
[command:quadrat]
math %1 * %1

; Kubik: kubik 3 -> 27
[command:kubik]
math %1 * %1 * %1

; Prozent: prozent 200 15 -> 30 (15% von 200)
[command:prozent]
math %1 * %2 / 100

; Durchschnitt: avg 10 20 -> 15
[command:avg]
math (%1 + %2) / 2

; Flaeche Rechteck: flaeche 5 10 -> 50
[command:flaeche]
math %1 * %2

; Umfang Rechteck: umfang 5 10 -> 30
[command:umfang]
math 2 * (%1 + %2)

; Celsius -> Fahrenheit: c2f 100 -> 212
[command:c2f]
math %1 * 9 / 5 + 32

; Fahrenheit -> Celsius: f2c 212 -> 100
[command:f2c]
math (%1 - 32) * 5 / 9
